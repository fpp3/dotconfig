# GlazeWM config generated from sway config (fpp3)
# Target: Windows 11 + GlazeWM + Zebar
# Notes:
# - Input/output (keyboard/layout/monitor modes) are omitted intentionally.
# - Modifier is Alt (since Win key combos didn't work reliably in Windows): alt
# - Launcher: Flow Launcher

general:
  startup_commands: [
    # Start Zebar (bar). You can replace with a full path or a script if needed.
    'shell-exec zebar'
  ]

  # mimic: focus_follows_mouse no
  focus_follows_cursor: false

  hide_method: 'cloak'
  show_all_in_taskbar: false

gaps:
  scale_with_dpi: true

  # Waybar height was 25; keep some breathing room for Zebar on top.
  inner_gap: '0px'
  outer_gap:
    top: '35px'
    right: '0px'
    bottom: '0px'
    left: '0px'

workspaces:
  - name: '1'
  - name: '2'
  - name: '3'
  - name: '4'
  - name: '5'
  - name: '6'
  - name: '7'
  - name: '8'
  - name: '9'
  - name: '10'

window_rules:
  # Ignore Zebar windows.
  - commands: ['ignore']
    match:
      - window_process: { equals: 'zebar' }

  # Dialogs / popups floating (approximation of your sway for_window rules).
  - commands: ['set-floating']
    match:
      - window_title: { regex: '^(Open|Save) (File|Folder|As)$' }
  - commands: ['set-floating']
    match:
      - window_title: { regex: '^(Settings|settings)$' }

binding_modes:
  - name: 'resize'
    keybindings:
      - commands: ['resize --width -2%']
        bindings: ['h', 'left']
      - commands: ['resize --width +2%']
        bindings: ['l', 'right']
      - commands: ['resize --height +2%']
        bindings: ['k', 'up']
      - commands: ['resize --height -2%']
        bindings: ['j', 'down']
      - commands: ['wm-disable-binding-mode --name resize']
        bindings: ['escape', 'enter']

keybindings:
  # Terminal
  - commands: ['shell-exec wt']
    bindings: ['alt+enter']

  # Close window (sway: $mod+Shift+q)
  - commands: ['close']
    bindings: ['alt+shift+q']

  # Reload config (sway: $mod+Shift+c)
  - commands: ['wm-reload-config']
    bindings: ['alt+shift+c']

  # Exit WM (sway: $mod+Shift+e)
  - commands: ['wm-exit']
    bindings: ['alt+shift+e']

  # Launcher (sway: $mod+d) -> Flow Launcher
  # If Flow Launcher is installed but not in PATH, replace with full path to Flow.Launcher.exe
  - commands: ['shell-exec flow']
    bindings: ['alt+d']

  # Focus movement (sway vim keys + arrows)
  - commands: ['focus --direction left']
    bindings: ['alt+h', 'alt+left']
  - commands: ['focus --direction down']
    bindings: ['alt+j', 'alt+down']
  - commands: ['focus --direction up']
    bindings: ['alt+k', 'alt+up']
  - commands: ['focus --direction right']
    bindings: ['alt+l', 'alt+right']

  # Move window
  - commands: ['move --direction left']
    bindings: ['alt+shift+h', 'alt+shift+left']
  - commands: ['move --direction down']
    bindings: ['alt+shift+j', 'alt+shift+down']
  - commands: ['move --direction up']
    bindings: ['alt+shift+k', 'alt+shift+up']
  - commands: ['move --direction right']
    bindings: ['alt+shift+l', 'alt+shift+right']

  # Workspaces
  - commands: ['focus --workspace 1']
    bindings: ['alt+1']
  - commands: ['focus --workspace 2']
    bindings: ['alt+2']
  - commands: ['focus --workspace 3']
    bindings: ['alt+3']
  - commands: ['focus --workspace 4']
    bindings: ['alt+4']
  - commands: ['focus --workspace 5']
    bindings: ['alt+5']
  - commands: ['focus --workspace 6']
    bindings: ['alt+6']
  - commands: ['focus --workspace 7']
    bindings: ['alt+7']
  - commands: ['focus --workspace 8']
    bindings: ['alt+8']
  - commands: ['focus --workspace 9']
    bindings: ['alt+9']
  - commands: ['focus --workspace 10']
    bindings: ['alt+0']

  - commands: ['move --workspace 1', 'focus --workspace 1']
    bindings: ['alt+shift+1']
  - commands: ['move --workspace 2', 'focus --workspace 2']
    bindings: ['alt+shift+2']
  - commands: ['move --workspace 3', 'focus --workspace 3']
    bindings: ['alt+shift+3']
  - commands: ['move --workspace 4', 'focus --workspace 4']
    bindings: ['alt+shift+4']
  - commands: ['move --workspace 5', 'focus --workspace 5']
    bindings: ['alt+shift+5']
  - commands: ['move --workspace 6', 'focus --workspace 6']
    bindings: ['alt+shift+6']
  - commands: ['move --workspace 7', 'focus --workspace 7']
    bindings: ['alt+shift+7']
  - commands: ['move --workspace 8', 'focus --workspace 8']
    bindings: ['alt+shift+8']
  - commands: ['move --workspace 9', 'focus --workspace 9']
    bindings: ['alt+shift+9']
  - commands: ['move --workspace 10', 'focus --workspace 10']
    bindings: ['alt+shift+0']

  # Fullscreen
  - commands: ['toggle-fullscreen']
    bindings: ['alt+f']

  # Floating toggle (sway: $mod+Shift+space)
  - commands: ['toggle-floating --centered']
    bindings: ['alt+shift+space']

  # Cycle focus (closest to sway: $mod+space focus mode_toggle)
  - commands: ['wm-cycle-focus']
    bindings: ['alt+space']

  # Resize mode toggle (sway: $mod+r)
  - commands: ['wm-enable-binding-mode --name resize']
    bindings: ['alt+r']

  # Screenshots: placeholders (implement with ShareX/Flameshot/PowerToys)
  # - commands: ['shell-exec ...']
  #   bindings: ['printscreen']

  # Media keys: leave to Windows / apps

# (Removed previous experimental lwin bindings)